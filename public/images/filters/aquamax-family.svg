<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="140" y1="110" x2="1080" y2="730" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0FDFA"/>
      <stop offset="0.55" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(860 240) rotate(22) scale(640 380)">
      <stop stop-color="#38BDF8" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="unit" x1="430" y1="240" x2="780" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="accent" x1="500" y1="420" x2="740" y2="660" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="800" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="800" rx="56" fill="url(#bg)"/>
  <rect width="1200" height="800" rx="56" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <!-- countertop unit -->
    <path d="M470 310c0-44 36-80 80-80h110c44 0 80 36 80 80v270c0 52-42 94-94 94H564c-52 0-94-42-94-94V310z" fill="url(#unit)" stroke="#E2E8F0" stroke-width="2"/>
    <path d="M500 340h320" stroke="#CBD5E1" stroke-width="2" opacity="0.8"/>

    <!-- display -->
    <rect x="540" y="370" width="160" height="78" rx="20" fill="#0F172A" fill-opacity="0.06" stroke="#E2E8F0"/>
    <path d="M568 410h104" stroke="#14B8A6" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <path d="M590 432h60" stroke="#38BDF8" stroke-width="6" stroke-linecap="round" opacity="0.55"/>

    <!-- base accent -->
    <path d="M520 520c0-18 14-32 32-32h196c18 0 32 14 32 32v78c0 28-22 50-50 50H570c-28 0-50-22-50-50v-78z" fill="url(#accent)" opacity="0.9"/>
    <path d="M540 548c80 20 160 20 220-10" stroke="#FFFFFF" stroke-opacity="0.32" stroke-width="3"/>
  </g>

  <g opacity="0.92">
    <rect x="120" y="610" width="460" height="84" rx="20" fill="#FFFFFF" fill-opacity="0.72" stroke="#E2E8F0"/>
    <text x="150" y="662" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="22" fill="#0F172A" font-weight="650">
      Family Countertop
    </text>
    <text x="150" y="690" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="16" fill="#475569">
      Highcapacity countertop filter
    </text>
  </g>
</svg>
