<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="130" y1="110" x2="1070" y2="730" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.55" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(380 250) rotate(20) scale(680 400)">
      <stop stop-color="#10B981" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="housing" x1="430" y1="210" x2="780" y2="690" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="pipe" x1="330" y1="360" x2="870" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1200" height="800" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="800" rx="56" fill="url(#bg)"/>
  <rect width="1200" height="800" rx="56" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <!-- inlet/outlet pipe -->
    <rect x="250" y="330" width="700" height="56" rx="28" fill="#FFFFFF" fill-opacity="0.7" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="280" y="346" width="640" height="24" rx="12" fill="url(#pipe)" opacity="0.85"/>

    <!-- whole-house housing -->
    <path d="M500 220c0-36 29-65 65-65h70c36 0 65 29 65 65v30c0 15 6 30 17 41l18 18c17 17 27 40 27 64v264c0 50-40 90-90 90H528c-50 0-90-40-90-90V373c0-24 10-47 27-64l18-18c11-11 17-26 17-41v-30z" fill="url(#housing)" stroke="#E2E8F0" stroke-width="2"/>
    <path d="M500 290h260" stroke="#CBD5E1" stroke-width="2" opacity="0.8"/>

    <!-- inner cartridge -->
    <path d="M555 412c0-18 14-32 32-32h66c18 0 32 14 32 32v178c0 22-18 40-40 40h-50c-22 0-40-18-40-40V412z" fill="#0F172A" fill-opacity="0.05" stroke="#E2E8F0"/>
    <path d="M573 450h130" stroke="#14B8A6" stroke-width="4" opacity="0.55"/>
    <path d="M573 488h130" stroke="#38BDF8" stroke-width="4" opacity="0.35"/>
    <path d="M573 526h130" stroke="#10B981" stroke-width="4" opacity="0.30"/>

    <!-- badge -->
    <rect x="535" y="318" width="210" height="56" rx="18" fill="#FFFFFF" fill-opacity="0.72" stroke="#E2E8F0"/>
    <text x="560" y="352" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="16" fill="#0F172A" font-weight="700">
      HydroGuard
    </text>
  </g>

  <g opacity="0.92">
    <rect x="120" y="610" width="520" height="84" rx="20" fill="#FFFFFF" fill-opacity="0.72" stroke="#E2E8F0"/>
    <text x="150" y="662" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="22" fill="#0F172A" font-weight="650">
      WholeHouse Filter
    </text>
    <text x="150" y="690" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="16" fill="#475569">
      Protect every tap in your home
    </text>
  </g>
</svg>
